name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/zephyr-build:main
      options: --user root
    env:
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains/zephyr-sdk-1.0.0
    strategy:
      fail-fast: false
      matrix:
        board:
          - qemu_riscv64
          - rak4631
          - heltec_wifi_lora32_v2/esp32/procpu
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          path: terrascope

      - name: Cache west modules
        uses: actions/cache@v5
        with:
          path: |
            bootloader
            modules
            tools
            zephyr
          key: west-${{ hashFiles('terrascope/west.yml') }}
          restore-keys: |
            west-

      - name: West init and update
        run: |
          west init -l terrascope
          west update --narrow --fetch-opt=--depth=1

      - name: Build ${{ matrix.board }}
        working-directory: terrascope
        run: west build -b ${{ matrix.board }} -p

  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/zephyr-build:main
      options: --user root
    env:
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains/zephyr-sdk-1.0.0
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          path: terrascope

      - name: Cache west modules
        uses: actions/cache@v5
        with:
          path: |
            bootloader
            modules
            tools
            zephyr
          key: west-${{ hashFiles('terrascope/west.yml') }}
          restore-keys: |
            west-

      - name: West init and update
        run: |
          west init -l terrascope
          west update --narrow --fetch-opt=--depth=1

      - name: Run tests
        working-directory: terrascope
        run: west twister -T tests -p qemu_riscv64 --no-shuffle

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: terrascope/twister-out/twister_report.xml

  docs:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: test-report

      - name: Generate test results HTML
        run: python3 scripts/twister_to_html.py twister_report.xml test_results.html

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Generate docs
        run: doxygen Doxyfile

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
